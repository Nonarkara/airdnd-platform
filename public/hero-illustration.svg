<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8f5ee"/>
      <stop offset="100%" stop-color="#d4eddf"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c4a0"/>
      <stop offset="100%" stop-color="#d4a878"/>
    </linearGradient>
    <linearGradient id="cloth1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a9d6e"/>
      <stop offset="100%" stop-color="#1e7a54"/>
    </linearGradient>
    <linearGradient id="cloth2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="100%" stop-color="#d48a20"/>
    </linearGradient>
    <linearGradient id="mat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
    <linearGradient id="leaf1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a9d6e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e7a54" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a9d6e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e7a54" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="16"/>

  <!-- Decorative botanical elements - top left -->
  <g opacity="0.6">
    <ellipse cx="80" cy="60" rx="60" ry="25" fill="url(#leaf1)" transform="rotate(-30 80 60)"/>
    <ellipse cx="50" cy="90" rx="50" ry="20" fill="url(#leaf2)" transform="rotate(-50 50 90)"/>
    <ellipse cx="120" cy="40" rx="45" ry="18" fill="url(#leaf2)" transform="rotate(-10 120 40)"/>
  </g>

  <!-- Decorative botanical elements - bottom right -->
  <g opacity="0.5">
    <ellipse cx="720" cy="540" rx="65" ry="25" fill="url(#leaf1)" transform="rotate(150 720 540)"/>
    <ellipse cx="750" cy="510" rx="55" ry="22" fill="url(#leaf2)" transform="rotate(130 750 510)"/>
    <ellipse cx="680" cy="560" rx="48" ry="19" fill="url(#leaf2)" transform="rotate(170 680 560)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="680" cy="100" r="40" fill="#2a9d6e" opacity="0.06"/>
  <circle cx="700" cy="120" r="25" fill="#f0a030" opacity="0.08"/>
  <circle cx="120" cy="480" r="35" fill="#2a9d6e" opacity="0.05"/>

  <!-- Thai massage mat / platform -->
  <rect x="180" y="380" width="440" height="24" rx="8" fill="url(#mat)" opacity="0.7"/>
  <rect x="190" y="384" width="420" height="16" rx="6" fill="#C4A44A" opacity="0.3"/>

  <!-- Client lying on mat (simplified, tasteful) -->
  <g>
    <!-- Body -->
    <ellipse cx="400" cy="350" rx="160" ry="35" fill="#f5ebe0" opacity="0.9"/>
    <!-- Torso with cloth -->
    <rect x="300" y="320" width="200" height="60" rx="20" fill="url(#cloth2)" opacity="0.8"/>
    <!-- Head -->
    <circle cx="510" cy="340" r="28" fill="url(#skin)"/>
    <!-- Hair -->
    <ellipse cx="525" cy="330" rx="22" ry="20" fill="#3d2b1f"/>
    <!-- Legs hint -->
    <rect x="240" y="330" width="80" height="40" rx="18" fill="url(#cloth2)" opacity="0.7"/>
  </g>

  <!-- Therapist (kneeling, performing massage) -->
  <g>
    <!-- Body/torso -->
    <ellipse cx="380" cy="290" rx="30" ry="50" fill="url(#cloth1)"/>
    <!-- Head -->
    <circle cx="380" cy="235" r="24" fill="url(#skin)"/>
    <!-- Hair (tied up, traditional) -->
    <ellipse cx="380" cy="222" rx="20" ry="16" fill="#2d1f14"/>
    <circle cx="380" cy="212" r="8" fill="#2d1f14"/>
    <!-- Arms reaching to client -->
    <path d="M 360 270 Q 340 300 420 320" stroke="url(#skin)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M 400 270 Q 430 290 460 310" stroke="url(#skin)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Knees -->
    <ellipse cx="365" cy="360" rx="15" ry="20" fill="url(#cloth1)"/>
    <ellipse cx="395" cy="360" rx="15" ry="20" fill="url(#cloth1)"/>
  </g>

  <!-- Decorative Thai elements -->
  <!-- Lotus flower - left -->
  <g transform="translate(140, 260)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="12" ry="22" fill="#e8a0b0" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="12" ry="22" fill="#eab0c0" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="12" ry="22" fill="#e8a0b0" transform="rotate(20)"/>
    <circle cx="0" cy="0" r="6" fill="#f0c040"/>
  </g>

  <!-- Lotus flower - right -->
  <g transform="translate(660, 300)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="10" ry="18" fill="#e8a0b0" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="10" ry="18" fill="#eab0c0" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="10" ry="18" fill="#e8a0b0" transform="rotate(20)"/>
    <circle cx="0" cy="0" r="5" fill="#f0c040"/>
  </g>

  <!-- Hot compress / herbal ball -->
  <g transform="translate(600, 350)">
    <circle cx="0" cy="0" r="18" fill="#7a9e6e" opacity="0.8"/>
    <circle cx="0" cy="0" r="12" fill="#8ab87e" opacity="0.6"/>
    <line x1="0" y1="-18" x2="0" y2="-35" stroke="#a0784a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-38" r="5" fill="#c4a060" opacity="0.5"/>
  </g>

  <!-- Essential oil bottles -->
  <g transform="translate(180, 350)">
    <rect x="-8" y="-25" width="16" height="30" rx="4" fill="#c0d4b8" opacity="0.8"/>
    <rect x="-5" y="-32" width="10" height="8" rx="2" fill="#a0b898"/>
    <rect x="12" y="-20" width="14" height="25" rx="4" fill="#d4c4a0" opacity="0.7"/>
    <rect x="15" y="-26" width="8" height="7" rx="2" fill="#b8a888"/>
  </g>

  <!-- Subtle sparkle/wellness dots -->
  <circle cx="300" cy="200" r="3" fill="#2a9d6e" opacity="0.3"/>
  <circle cx="500" cy="180" r="2.5" fill="#f0a030" opacity="0.35"/>
  <circle cx="250" cy="250" r="2" fill="#2a9d6e" opacity="0.25"/>
  <circle cx="550" cy="230" r="2.5" fill="#2a9d6e" opacity="0.2"/>
  <circle cx="450" cy="190" r="2" fill="#f0a030" opacity="0.25"/>

  <!-- Text area hint - "Thai Wellness" in subtle -->
  <text x="400" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#2a9d6e" opacity="0.4" letter-spacing="0.3em">TRADITIONAL THAI WELLNESS</text>
</svg>
