<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" fill="none">
  <!-- Kamekura-inspired geometric Thai massage illustration -->
  <!-- Deep background -->
  <rect width="800" height="700" fill="#141414"/>

  <!-- Large vermillion circle (Kamekura's Olympic motif) -->
  <circle cx="400" cy="350" r="260" fill="#d44527"/>

  <!-- Negative-space silhouette: therapist and client (Olly Moss style) -->
  <!-- Client lying on mat - carved from the circle -->
  <path d="M180 440 Q200 380 260 370 L280 365 Q300 360 310 370 L330 390 Q340 400 360 400 L500 400 Q520 400 530 390 L540 380 Q550 370 570 375 L600 385 Q620 395 620 440 Z" fill="#141414"/>

  <!-- Mat/platform -->
  <rect x="160" y="440" width="480" height="12" fill="#141414"/>

  <!-- Therapist silhouette - kneeling -->
  <path d="M340 440 L340 380 Q340 360 350 345 L355 335 Q360 320 365 310 L370 300 Q375 280 380 270 L385 260 Q390 245 385 235 Q380 225 375 220 Q365 210 370 195 Q375 175 390 170 Q405 165 415 175 Q425 185 420 200 Q418 210 410 218 Q405 225 408 240 L415 260 Q420 275 430 285 L445 300 Q455 310 460 325 L465 340 Q468 355 465 370 L462 400 L462 440 Z" fill="#141414"/>

  <!-- Therapist's arms pressing down -->
  <path d="M370 300 Q350 310 340 325 L325 345 Q315 360 310 370 L305 380" stroke="#141414" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M430 285 Q445 295 455 310 L465 330 Q470 345 472 355" stroke="#141414" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- Herbal compress circles (geometric elements) -->
  <circle cx="230" cy="300" r="22" fill="none" stroke="#f0ece4" stroke-width="2"/>
  <circle cx="230" cy="300" r="12" fill="#f0ece4" opacity="0.15"/>
  <circle cx="570" cy="280" r="18" fill="none" stroke="#f0ece4" stroke-width="2"/>
  <circle cx="570" cy="280" r="9" fill="#f0ece4" opacity="0.15"/>

  <!-- Geometric lotus (Kamekura-style abstraction) -->
  <g transform="translate(400, 160)">
    <ellipse cx="0" cy="0" rx="8" ry="30" fill="#f0ece4" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="8" ry="30" fill="#f0ece4" opacity="0.7" transform="rotate(36)"/>
    <ellipse cx="0" cy="0" rx="8" ry="30" fill="#f0ece4" opacity="0.5" transform="rotate(72)"/>
    <ellipse cx="0" cy="0" rx="8" ry="30" fill="#f0ece4" opacity="0.7" transform="rotate(-36)"/>
    <ellipse cx="0" cy="0" rx="8" ry="30" fill="#f0ece4" opacity="0.5" transform="rotate(-72)"/>
    <circle cx="0" cy="0" r="6" fill="#c49a3c"/>
  </g>

  <!-- Horizontal geometric lines (Swiss modernism) -->
  <line x1="100" y1="520" x2="700" y2="520" stroke="#f0ece4" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="540" x2="700" y2="540" stroke="#f0ece4" stroke-width="1" opacity="0.1"/>
  <line x1="100" y1="560" x2="700" y2="560" stroke="#f0ece4" stroke-width="1" opacity="0.05"/>

  <!-- Corner geometric marks -->
  <rect x="100" y="100" width="40" height="2" fill="#f0ece4" opacity="0.3"/>
  <rect x="100" y="100" width="2" height="40" fill="#f0ece4" opacity="0.3"/>
  <rect x="660" y="100" width="40" height="2" fill="#f0ece4" opacity="0.3"/>
  <rect x="698" y="100" width="2" height="40" fill="#f0ece4" opacity="0.3"/>

  <!-- "SABAI" text treatment in geometric style -->
  <text x="400" y="630" text-anchor="middle" fill="#f0ece4" font-family="Inter, Helvetica, sans-serif" font-size="11" font-weight="800" letter-spacing="0.35em" opacity="0.25">THAILAND MASSAGE &amp; SPA DIRECTORY</text>

  <!-- Small gold accent circle -->
  <circle cx="400" cy="660" r="3" fill="#c49a3c"/>
</svg>
